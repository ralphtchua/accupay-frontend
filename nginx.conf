# nginx config for the production image.
# Serves the static React build and falls back to index.html for client-side
# routes (so /dashboard, /approvals, etc. work on refresh / direct link).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cache hashed assets aggressively; they're content-addressed by Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unmatched path serves the app entry.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
